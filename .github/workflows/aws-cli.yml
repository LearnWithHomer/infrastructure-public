name: AWS CLI

on:
  workflow_call:
    inputs:
      aws-region:
        required: true
        type: string
      role-arn:
        required: true
        type: string
      cli-commands:
        required: true
        type: string

jobs:
  aws-cli-commands:
    runs-on: self-hosted
    steps:
      - name: Install AWS CLI
        uses: aws-actions/setup-aws-cli@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.role-arn }}
          aws-region: ${{ inputs.aws-region }}

      - name: Execute AWS CLI commands
        shell: bash
        run: |
          set -euo pipefail
          echo "AWS CLI version: $(aws --version 2>&1)"
          bash -euxo pipefail -c '${{ inputs.cli-commands }}'